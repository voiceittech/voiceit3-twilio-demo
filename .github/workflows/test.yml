name: Build
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '18'
      - name: Check function syntax
        run: |
          errors=0
          for f in functions/voice/*.js functions/sms/*.js; do
            if [ -f "$f" ]; then
              node -e "require('fs').readFileSync('$f', 'utf8')" && echo "OK: $f" || { echo "FAIL: $f"; errors=$((errors+1)); }
            fi
          done
          exit $errors
